# Database settings: MySQL on port 3307 (Docker)
spring.datasource.url=jdbc:mysql://localhost:3307/employee_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Server config
server.port=8080

# JWT security settings
jwt.secret=9a67475d4546454d4f4b4f51475c43234149484b424d5d4d4e51484a4b4c4d4e51484a4b4c4d4e51484a4b4c4d4e51484a4b4c4d4e
jwt.expiration-ms=86400000

# Email Configuration (SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${EMAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# SendGrid Configuration (Optional: Use instead of SMTP)
# sendgrid.api-key=${SENDGRID_API_KEY:your-sendgrid-api-key}
# sendgrid.from-email=noreply@yourcompany.com

# Twilio SMS Configuration
twilio.account-sid=${TWILIO_ACCOUNT_SID:your-account-sid}
twilio.auth-token=${TWILIO_AUTH_TOKEN:your-auth-token}
twilio.phone-number=${TWILIO_PHONE_NUMBER:+1234567890}

# Application Email Settings
app.mail.from=noreply@employee-management.com
app.mail.from-name=Employee Management System

# Optional: H2 settings for quick fallback (commented out)
# spring.datasource.url=jdbc:h2:mem:employee_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=

# Logging
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.com.example.employee=DEBUG
