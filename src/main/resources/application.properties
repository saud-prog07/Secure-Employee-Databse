# ===== DATABASE CONFIGURATION =====
# Database settings: MySQL on port 3307 (Docker) or 3306 (local)
# IMPORTANT: Use environment variables in production!
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:employee_db}?useSSL=${DB_USE_SSL:true}&serverTimezone=UTC&allowPublicKeyRetrieval=false&createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ===== SERVER CONFIGURATION =====
server.port=${SERVER_PORT:8080}

# ===== SECURITY: JWT =====
# CRITICAL: Change jwt.secret in production! Use strong, random 256+ bit key
# Generate: openssl rand -base64 32
jwt.secret=${JWT_SECRET:change-this-in-production-generate-strong-256bit-key}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ===== EMAIL CONFIGURATION (SMTP) =====
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${EMAIL_USERNAME:}
spring.mail.password=${EMAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ===== TWILIO SMS (Optional) =====
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.phone-number=${TWILIO_PHONE_NUMBER:}

# ===== APPLICATION SETTINGS =====
app.mail.from=${APP_MAIL_FROM:noreply@employee-management.com}
app.mail.from-name=${APP_MAIL_FROM_NAME:Employee Management System}

# ===== LOGGING =====
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.com.example.employee=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/application.log
logging.file.max-size=10MB
logging.file.max-history=10
